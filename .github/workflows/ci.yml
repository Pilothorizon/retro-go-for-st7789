name: ci
on:
  workflow_dispatch:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cleanup runner
      run: |
        df -h
        sudo rm -rf /opt/microsoft /usr/local/.ghcup /usr/local/julia* /usr/share/dotnet /usr/share/swift /usr/lib/llvm*
        df -h
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: .
        tags: retro-go:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    - name: Extract binaries from docker image
      run: |
        mkdir -p build
        docker run --rm -v $(pwd)/build:/build retro-go:latest sh -c "
          cp /app/*.fw /build/ 2>/dev/null || true
          cp /app/*.img /build/ 2>/dev/null || true
          cp /app/launcher/build/bootloader/bootloader.bin /build/bootloader.bin 2>/dev/null || true
          cp /app/launcher/build/partition_table/partition-table.bin /build/partition-table.bin 2>/dev/null || true
        "
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          build/*.fw
          build/*.img
          build/bootloader.bin
          build/partition-table.bin
